name: parity

# The EngineBash/EngineNative parity gates (windows-support plan, step 4).
# Until EngineNative lands (step 5) these run in self-parity mode — which
# still guards hermeticity/determinism of the engine and proves the harness
# can fail (prove-red). Step 5 adds --native runs as each module ports.

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "cli/**"
      - "SoT/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  pull_request:
    paths:
      - "lib/**"
      - "cli/**"
      - "SoT/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025] # pinned labels, never *-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests (vitest + @effect/vitest)
        run: bun run test:unit

      - name: Dry-run parity (self)
        run: bun cli/test/parity-dryrun.ts

      - name: Dry-run parity can fail (prove-red)
        run: bun cli/test/parity-dryrun.ts --prove-red

      - name: Mutation parity (self)
        run: bun cli/test/parity-mutation.ts

      - name: Mutation parity can fail (prove-red)
        run: bun cli/test/parity-mutation.ts --prove-red
