name: golden-regression

# EngineNative golden-regression gates plus the Windows-native PowerShell
# smoke. The stub-based golden suites are POSIX-only by design: the stubs are
# shebang scripts a native win32 CreateProcess cannot exec. EngineNative's
# Windows behavior is covered by the native-windows job below (real PowerShell,
# HOME unset, %USERPROFILE% resolution, .cmd tool spawning) and by
# windows-entrypoints.yml.

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "SoT/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  pull_request:
    paths:
      - "cli/**"
      - "SoT/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden:
    runs-on: ubuntu-24.04 # pinned label, never *-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests (vitest + @effect/vitest)
        run: bun run test:unit

      - name: Dry-run golden regression
        run: bun run golden:dryrun

      - name: Dry-run golden can fail (prove-red)
        run: |
          set +e
          out="$(bun run golden:dryrun --prove-red 2>&1)"
          code=$?
          printf '%s\n' "$out"
          if [[ "$code" -eq 0 ]]; then
            echo "::error::prove-red unexpectedly exited 0"
            exit 1
          fi
          if ! grep -q "prove-red OK: golden-dryrun" <<<"$out"; then
            echo "::error::prove-red failed without proving the planted mismatch"
            exit 1
          fi

      - name: Mutation golden regression
        run: bun run golden:mutation

      - name: Mutation golden can fail (prove-red)
        run: |
          set +e
          out="$(bun run golden:mutation --prove-red 2>&1)"
          code=$?
          printf '%s\n' "$out"
          if [[ "$code" -eq 0 ]]; then
            echo "::error::prove-red unexpectedly exited 0"
            exit 1
          fi
          if ! grep -q "prove-red OK: golden-mutation" <<<"$out"; then
            echo "::error::prove-red failed without proving the planted mismatch"
            exit 1
          fi

  # EngineNative under native PowerShell — no Git Bash in the loop.
  # HOME is deliberately unset so every path resolves via %USERPROFILE%
  # (pointed at a hermetic temp dir). The npm-stub steps exercise the
  # toolchain gate branches (--yes vs non-TTY pinned fallback) AND double as
  # the .cmd spawn canary: on Windows npm IS npm.cmd, so if the engine can't
  # spawn .cmd files these steps fail loudly instead of silently skipping.
  native-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare hermetic home (%USERPROFILE% -> temp, seeded from SoT)
        # The dir name carries a space on purpose — C:\Users\First Last is
        # the common real-world shape, so every path the engine builds from
        # the home gets quoting coverage for free.
        run: |
          $kitHome = Join-Path $env:RUNNER_TEMP "kit home"
          New-Item -ItemType Directory -Force -Path (Join-Path $kitHome ".claude") | Out-Null
          Copy-Item "SoT/.claude/settings.json" (Join-Path $kitHome ".claude/settings.json")
          "USERPROFILE=$kitHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: sync --dry-run resolves %USERPROFILE% paths
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $out = bun cli/src/main.ts sync --dry-run 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "sync --dry-run exited $LASTEXITCODE" }
          if ($out -notmatch "kit home") { throw "output never references the USERPROFILE-derived home" }
          if ($out -match "Unknown OS") { throw "unknown-OS warning leaked" }
          if ($out -match "bubblewrap") { throw "bubblewrap check ran on Windows (should be a known skip)" }
          if ($out -notmatch "setx ENABLE_CLAUDEAI_MCP_SERVERS") { throw "connector env not routed via setx on win32" }
          if ($out -match "\.bashrc") { throw "Unix shell-rc connector path ran on Windows (real-machine step-9 regression)" }

      - name: status --json parses and carries the captured toolchain table
        # The toolchain table travels through engineCapture (a native-raw
        # child re-spawn), which returns "" on a failed child — so parsing
        # alone would pass vacuously. Assert the table content made it.
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $out = bun cli/src/main.ts status --json | Out-String
          if ($LASTEXITCODE -ne 0) { throw "status --json exited $LASTEXITCODE" }
          $json = $out | ConvertFrom-Json
          if ($json.toolchainTable -notmatch "(?m)^npm\s+check\s+\d") { throw "toolchainTable lost the npm row - engineCapture child failed on Windows" }
          if ($json.toolchainTable -match "(?m)^bwrap") { throw "bwrap row present in the captured toolchain table" }

      - name: plugins list
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          bun cli/src/main.ts plugins list
          if ($LASTEXITCODE -ne 0) { throw "plugins list exited $LASTEXITCODE" }

      - name: model claude (get)
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $out = bun cli/src/main.ts model claude 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "model claude exited $LASTEXITCODE" }
          if ($out -notmatch "SoT:") { throw "model get output missing the SoT line" }

      - name: toolchain check (npm row is the .cmd spawn canary)
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $out = bun cli/src/main.ts toolchain check 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "toolchain check exited $LASTEXITCODE" }
          if ($out -match "(?m)^bwrap") { throw "bwrap row present in the Windows toolchain report" }
          if ($out -notmatch "(?m)^npm\s+check\s+\d") { throw "npm row has no version - EngineNative cannot spawn npm.cmd on Windows" }

      - name: Write npm gate stub (latest above kit-verified, argv-recording)
        run: |
          $stub = Join-Path $env:RUNNER_TEMP "gate-stubs"
          New-Item -ItemType Directory -Force -Path $stub | Out-Null
          @'
          @echo off
          rem redirection-first: args end in digits (…@0.99.0) and a digit
          rem before >> would parse as a file-descriptor redirect
          >> "%RUNNER_TEMP%\npm-argv.log" echo npm %*
          if "%1"=="view" echo 0.99.0
          exit /b 0
          '@ | Out-File -FilePath (Join-Path $stub "npm.cmd") -Encoding ascii
          "GATE_STUBS=$stub" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # The two gate steps assert the SELECTED VERSION via the recorded npm
      # argv, not just the warning text — a gate that logs one branch but
      # returns the other target must fail here.
      - name: toolchain ensure gate — non-TTY pinned fallback
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $env:Path = "$env:GATE_STUBS;$env:Path"
          Remove-Item (Join-Path $env:RUNNER_TEMP "npm-argv.log") -ErrorAction SilentlyContinue
          $verified = (Get-Content SoT/toolchain.json | ConvertFrom-Json).tools.'agent-browser'.verified
          $out = bun cli/src/main.ts toolchain ensure agent-browser 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "installing kit-verified agent-browser .* instead of 0\.99\.0") {
            throw "non-TTY pinned-fallback gate branch did not fire"
          }
          if ($out -match "anyway\? \[y/N\]") { throw "TTY prompt appeared in a non-TTY run" }
          $argv = Get-Content (Join-Path $env:RUNNER_TEMP "npm-argv.log") -Raw
          if ($argv -notmatch [regex]::Escape("install -g agent-browser@$verified")) {
            throw "gate selected the wrong target - npm argv was: $argv"
          }
          exit 0 # bun exits 1 (stub npm installs nothing) - the assertions above are the gate

      - name: toolchain ensure gate — --yes accepts above-verified
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          $env:Path = "$env:GATE_STUBS;$env:Path"
          Remove-Item (Join-Path $env:RUNNER_TEMP "npm-argv.log") -ErrorAction SilentlyContinue
          $out = bun cli/src/main.ts toolchain ensure agent-browser --yes 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "newer than kit-verified .* proceeding \(--yes\)") {
            throw "--yes gate branch did not fire"
          }
          $argv = Get-Content (Join-Path $env:RUNNER_TEMP "npm-argv.log") -Raw
          if ($argv -notmatch [regex]::Escape("install -g agent-browser@0.99.0")) {
            throw "--yes did not install latest - npm argv was: $argv"
          }
          exit 0 # bun exits 1 (stub npm installs nothing) - the assertions above are the gate
