name: golden-regression

# EngineNative golden-regression gates for supported Linux/macOS behavior.

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "SoT/**"
      - "notification.mp3"
      - "docks-kit"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  pull_request:
    paths:
      - "cli/**"
      - "SoT/**"
      - "notification.mp3"
      - "docks-kit"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/parity.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden:
    runs-on: ubuntu-24.04 # pinned label, never *-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generated payload is fresh
        run: bun cli/scripts/generate-sot-payload.ts --check

      - name: Unit tests (vitest + @effect/vitest)
        run: bun run test:unit

      - name: Materialized Claude runtime commands (POSIX shell + p95)
        run: bun cli/test/statusline-runtime-smoke.mjs posix

      - name: Dry-run golden regression
        run: bun run golden:dryrun

      - name: Dry-run golden can fail (prove-red)
        run: |
          set +e
          out="$(bun run golden:dryrun --prove-red 2>&1)"
          code=$?
          printf '%s\n' "$out"
          if [[ "$code" -eq 0 ]]; then
            echo "::error::prove-red unexpectedly exited 0"
            exit 1
          fi
          if ! grep -q "prove-red OK: golden-dryrun" <<<"$out"; then
            echo "::error::prove-red failed without proving the planted mismatch"
            exit 1
          fi

      - name: Mutation golden regression
        run: bun run golden:mutation

      - name: Mutation golden can fail (prove-red)
        run: |
          set +e
          out="$(bun run golden:mutation --prove-red 2>&1)"
          code=$?
          printf '%s\n' "$out"
          if [[ "$code" -eq 0 ]]; then
            echo "::error::prove-red unexpectedly exited 0"
            exit 1
          fi
          if ! grep -q "prove-red OK: golden-mutation" <<<"$out"; then
            echo "::error::prove-red failed without proving the planted mismatch"
            exit 1
          fi

