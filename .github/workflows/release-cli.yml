name: release-cli

# Builds the five docks-kit standalone binaries + SHA256SUMS and attaches them
# to the GitHub release for the pushed cli-v* tag, then publishes to npm when
# NPM_TOKEN is configured (optional — the publish step is skipped without it).
#
# Cut a release:
#   git tag cli-v0.1.0 && git push origin cli-v0.1.0

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write
  id-token: write # npm OIDC trusted publishing (tokenless)

jobs:
  release:
    runs-on: ubuntu-latest
    # Actions are pinned to full commit SHAs (tag comments alongside) and tool
    # versions are exact — mutable tags + @latest installs are the npm-worm
    # (Shai-Hulud-style) attack surface. Bump SHAs deliberately, never floating.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p cli

      - name: Build binaries (all five targets)
        run: bash cli/build-binaries.sh

      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --generate-notes || true
          gh release upload "${GITHUB_REF_NAME}" cli/dist/docks-kit-* cli/dist/SHA256SUMS --clobber

      # Tokenless npm publish via OIDC trusted publishing — no NPM_TOKEN secret.
      # One-time setup (in order):
      #   1. First-ever publish must be manual (npm can't attach a trusted
      #      publisher to a package that doesn't exist): npm login && npm publish
      #   2. npmjs.com -> docks-kit -> Settings -> Trusted Publisher: GitHub
      #      Actions, repo DocksDocks/public, workflow release-cli.yml
      # Until step 2 is done, publish fails here and is downgraded to a warning
      # so binaries-only releases stay green. npm CLI >= 11.5.1 required for
      # OIDC (bun publish doesn't do OIDC), hence setup-node + npm upgrade.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          npm install -g npm@11.18.0 # >= 11.5.1 needed for OIDC; exact pin
          npm publish --provenance --access public || {
            echo "::warning::npm publish failed — if the trusted publisher isn't configured yet, see the setup comment in this workflow"
            exit 0
          }
