name: windows-entrypoints

# Step 8 (windows-support plan): verify the supported Windows command
# surfaces. The compiled docks-kit-windows-x64.exe is THE no-toolchain path
# (no Bun, no Git Bash — the exe embeds the runtime and generated payload).
# The bun add -g shim covers the "#!/usr/bin/env bun" bin on Windows.
# install.sh remains documented Unix-only — it is deliberately not exercised
# here.
#
# Runner is the pinned label windows-2025, never the floating *-latest.

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "package.json"
      - "bun.lock"
      - "SoT/**"
      - "notification.mp3"
      - "docks-kit"
      - ".github/workflows/windows-entrypoints.yml"
  pull_request:
    paths:
      - "cli/**"
      - "package.json"
      - "bun.lock"
      - "SoT/**"
      - "notification.mp3"
      - "docks-kit"
      - ".github/workflows/windows-entrypoints.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-exe:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile the Windows binary
        run: bash cli/build-binaries.sh windows-x64

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docks-kit-windows-x64
          path: cli/dist/docks-kit-windows-x64.exe
          if-no-files-found: error

  # The exe on a clean runner: NO setup-bun on purpose — the binary embeds
  # the runtime. Git Bash exists on the GitHub image (unremovable) but is
  # never invoked: EngineNative runs in-process.
  exe-smoke:
    needs: build-exe
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docks-kit-windows-x64
          path: ${{ runner.temp }}/docks-kit-exe

      - name: Prepare hermetic legacy home and block Bun installation
        run: |
          $kitHome = Join-Path $env:RUNNER_TEMP "exe home O'Brien"
          $claude = Join-Path $kitHome ".claude"
          New-Item -ItemType Directory -Force -Path (Join-Path $claude "hooks") | Out-Null
          @'
          {
            "hooks": {
              "SessionStart": [{ "hooks": [{ "type": "command", "command": "legacy-session" }] }],
              "Notification": [{ "hooks": [{ "type": "command", "command": "legacy-notify" }] }],
              "Stop": [{ "hooks": [{ "type": "command", "command": "legacy-fetch" }] }]
            },
            "statusLine": { "type": "command", "command": "legacy-statusline", "refreshInterval": 5 },
            "userOnly": "preserved"
          }
          '@ | Set-Content -Path (Join-Path $claude "settings.json") -Encoding utf8
          [IO.File]::WriteAllText((Join-Path $claude "statusline.sh"), "legacy-statusline-marker`n")
          [IO.File]::WriteAllText((Join-Path $claude "fetch-usage.sh"), "legacy-fetch-marker`n")
          [IO.File]::WriteAllText((Join-Path $claude "hooks/notify.sh"), "legacy-notify-marker`n")
          $blocked = Join-Path $env:RUNNER_TEMP "blocked-bun-root"
          [IO.File]::WriteAllText($blocked, "regular file blocks BUN_INSTALL/bin")
          "USERPROFILE=$kitHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BUN_INSTALL=$blocked" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: exe real sync defers migration and preserves legacy fallbacks
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          if (Test-Path Env:DOCKS_KIT_HOME) { Remove-Item Env:DOCKS_KIT_HOME }
          Set-Location $env:RUNNER_TEMP
          $exe = Join-Path $env:RUNNER_TEMP "docks-kit-exe/docks-kit-windows-x64.exe"
          $settingsPath = Join-Path $env:USERPROFILE ".claude/settings.json"
          $before = Get-Content $settingsPath -Raw | ConvertFrom-Json
          $env:Path = "$env:SystemRoot\System32;$env:SystemRoot"
          $out = & $exe sync claude --skip-rtk 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "exe sync claude exited $LASTEXITCODE" }
          if ($out -notmatch "Bun unavailable — Claude statusline/hooks migration deferred") { throw "migration did not report deferred Bun" }
          if ($out -notmatch "Hooks:\s+migration deferred") { throw "deferred summary missing" }
          $after = Get-Content $settingsPath -Raw | ConvertFrom-Json
          foreach ($name in @("SessionStart", "Notification", "Stop")) {
            $a = $before.hooks.$name | ConvertTo-Json -Compress -Depth 20
            $b = $after.hooks.$name | ConvertTo-Json -Compress -Depth 20
            if ($a -ne $b) { throw "legacy hooks.$name subtree changed" }
          }
          if (($before.statusLine | ConvertTo-Json -Compress -Depth 20) -ne ($after.statusLine | ConvertTo-Json -Compress -Depth 20)) {
            throw "legacy statusLine subtree changed"
          }
          $claude = Join-Path $env:USERPROFILE ".claude"
          if ((Get-Content (Join-Path $claude "statusline.sh") -Raw) -ne "legacy-statusline-marker`n") { throw "statusline.sh marker changed" }
          if ((Get-Content (Join-Path $claude "fetch-usage.sh") -Raw) -ne "legacy-fetch-marker`n") { throw "fetch-usage.sh marker changed" }
          if ((Get-Content (Join-Path $claude "hooks/notify.sh") -Raw) -ne "legacy-notify-marker`n") { throw "notify.sh marker changed" }
          if (Test-Path (Join-Path $claude "bin")) { throw "runtime assets were written during deferred migration" }
          if (Test-Path (Join-Path $claude "notification.mp3")) { throw "notification audio was written during deferred migration" }

      - name: exe status (compiled re-spawn seam)
        # engineCapture in a compiled binary re-spawns process.execPath
        # WITHOUT the main.ts path — regression guard for that argv contract.
        # The npm-row assertion is the real proof: engineCapture returns ""
        # on a failed child, so "Kit home:" alone would pass vacuously.
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          if (Test-Path Env:DOCKS_KIT_HOME) { Remove-Item Env:DOCKS_KIT_HOME }
          Set-Location $env:RUNNER_TEMP
          $exe = Join-Path $env:RUNNER_TEMP "docks-kit-exe/docks-kit-windows-x64.exe"
          $out = & $exe status 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "exe status exited $LASTEXITCODE" }
          if ($out -notmatch "Kit home:") { throw "status output missing the kit-home line" }
          if ($out -match "Unknown arg") { throw "compiled re-spawn passed a stray main.ts arg" }
          if ($out -notmatch "(?m)^npm\s+check\s+\d") { throw "toolchain table lost - compiled engineCapture child failed" }

  # The "#!/usr/bin/env bun" bin installed globally: bun must create a
  # working Windows shim, and the generated payload must remain available
  # when the package runs outside any checkout.
  bun-shim:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14 # keep in step with SoT/toolchain.json tools.bun.verified

      - name: Pack and install globally from the tarball
        run: |
          $env:NO_COLOR = "1"
          bun pm pack --destination $env:RUNNER_TEMP
          if ($LASTEXITCODE -ne 0) { throw "bun pm pack exited $LASTEXITCODE (prepack --check failed?)" }
          $tgz = Get-ChildItem (Join-Path $env:RUNNER_TEMP "*.tgz") | Select-Object -First 1
          if (-not $tgz) { throw "bun pm pack produced no tarball" }
          $listing = tar -tf $tgz.FullName | Out-String
          if ($listing -match "package/SoT/|package/notification\.mp3") { throw "tarball still publishes authoring payload files" }
          $installOut = bun add -g $tgz.FullName 2>&1 | Out-String
          $installCode = $LASTEXITCODE
          Write-Host $installOut
          if ($installCode -ne 0) { throw "bun add -g failed with exit $installCode" }

          $blockedLine = 'Blocked 1 postinstall. Run `bun pm -g untrusted` for details.'
          $blockedLines = @($installOut -split "\r?\n" | Where-Object { $_ -eq $blockedLine })
          if ($blockedLines.Count -ne 1) {
            throw "expected exactly one known blocked-postinstall line; got $($blockedLines.Count)"
          }

          $untrusted = bun pm -g untrusted 2>&1 | Out-String
          $untrustedCode = $LASTEXITCODE
          Write-Host $untrusted
          if ($untrustedCode -ne 0) { throw "bun pm -g untrusted exited $untrustedCode" }
          # bun prints the blocked path with the platform separator (".\node_modules\..." on Windows)
          $packageLines = @($untrusted -split "\r?\n" | Where-Object { $_ -match '^\.[\\/]node_modules[\\/]' })
          if ($packageLines.Count -ne 1 -or ($packageLines[0] -replace '\\', '/') -ne "./node_modules/@parcel/watcher @2.5.6") {
            throw "blocked package set changed: $($packageLines -join ', ')"
          }
          $scriptLines = @($untrusted -split "\r?\n" | Where-Object { $_ -match '^ » \[[^]]+\]:' })
          if ($scriptLines.Count -ne 1 -or $scriptLines[0] -ne " » [install]: node scripts/build-from-source.js") {
            throw "blocked install command changed: $($scriptLines -join ', ')"
          }

          $globalListing = bun pm -g ls --all 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "bun pm -g ls --all failed" }
          if ($globalListing -match '(?i)\besbuild(?:@|\s)') { throw "consumer install unexpectedly contains esbuild" }

      - name: Prepare hermetic shim home
        # bun's global bin lives under the pre-flip profile; pin its absolute
        # dir onto PATH so the docks-kit shim stays reachable after USERPROFILE
        # moves to the hermetic home.
        run: |
          $globalBin = (& bun pm bin -g | Out-String).Trim()
          $preFlip = Get-Command docks-kit -ErrorAction SilentlyContinue
          Write-Host "bun global bin: $globalBin; shim pre-flip: $(if ($preFlip) { $preFlip.Source } else { 'NOT RESOLVED' })"
          $globalBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $kitHome = Join-Path $env:RUNNER_TEMP "shim home O'Brien"
          New-Item -ItemType Directory -Force -Path $kitHome | Out-Null
          "USERPROFILE=$kitHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Shim works from a foreign cwd (embedded payload)
        run: |
          if (Test-Path Env:DOCKS_KIT_HOME) { Remove-Item Env:DOCKS_KIT_HOME }
          Set-Location $env:RUNNER_TEMP
          $out = docks-kit models claude 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "docks-kit models claude exited $LASTEXITCODE" }
          if ($out -notmatch "claude-opus-4-8") { throw "models catalog missing - embedded payload not resolved" }

      - name: Shim drives the engine (toolchain check)
        run: |
          Set-Location $env:RUNNER_TEMP
          $out = docks-kit toolchain check 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "docks-kit toolchain check exited $LASTEXITCODE" }
          if ($out -notmatch "(?m)^npm\s+check\s+\d") { throw "npm row has no version" }

      - name: Sync and execute commands read from materialized settings
        run: |
          if (Test-Path Env:HOME) { Remove-Item Env:HOME }
          if (Test-Path Env:DOCKS_KIT_HOME) { Remove-Item Env:DOCKS_KIT_HOME }
          Set-Location $env:RUNNER_TEMP
          $sync = docks-kit sync claude --skip-rtk 2>&1 | Out-String
          Write-Host $sync
          if ($LASTEXITCODE -ne 0) { throw "docks-kit sync claude exited $LASTEXITCODE" }
          $settings = Get-Content (Join-Path $env:USERPROFILE ".claude/settings.json") -Raw | ConvertFrom-Json
          if ($settings.hooks.PSObject.Properties.Name -contains "Stop") { throw "materialized settings retained hooks.Stop" }

          $session = $settings.hooks.SessionStart[0].hooks[0]
          $sessionArgs = @($session.args)
          $sessionOut = & $session.command @sessionArgs 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "SessionStart direct hook exited $LASTEXITCODE" }
          if ($sessionOut -notmatch "(?m)^\[CONTEXT\]" -or $sessionOut -notmatch "(?m)^\[CONFIG\]") {
            throw "SessionStart output missing its two labels"
          }

          $notification = $settings.hooks.Notification[0].hooks[0]
          $notificationArgs = @($notification.args)
          $savedPath = $env:Path
          $env:Path = ""
          $notificationOut = & $notification.command @notificationArgs 2>&1 | Out-String
          $notificationCode = $LASTEXITCODE
          $env:Path = $savedPath
          if ($notificationCode -ne 0) { throw "Notification direct hook exited ${notificationCode}: $notificationOut" }

          $inputJson = @{
            model = @{ display_name = "Opus 4.8 (1M context)" }
            workspace = @{ current_dir = $env:RUNNER_TEMP }
            context_window = @{ used_percentage = 25; context_window_size = 200000 }
            rate_limits = @{
              five_hour = @{ used_percentage = 44; resets_at = $null }
              seven_day = @{ used_percentage = 55; resets_at = $null }
            }
          } | ConvertTo-Json -Compress -Depth 10
          $statusOut = $inputJson | & powershell.exe -NoProfile -NonInteractive -Command $settings.statusLine.command 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "statusLine stored command exited $LASTEXITCODE" }
          if ($statusOut -notmatch "Opus 4\.8" -or $statusOut -notmatch "5h 44%" -or $statusOut -notmatch "7d 55%") {
            throw "statusLine native fields missing from output: $statusOut"
          }
