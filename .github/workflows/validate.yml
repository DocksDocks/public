name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.filter.outputs.agents }}
      skills: ${{ steps.filter.outputs.skills }}
      commands: ${{ steps.filter.outputs.commands }}
      settings: ${{ steps.filter.outputs.settings }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v5

      # Emit one boolean per category. Commands depend on agents (via subagent_type
      # cross-refs), so a pure "agents-only" change still triggers command checks below.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            agents:
              - 'ssot/.claude/agents/**'
              - 'guard-agents.sh'
              - 'score-agents.sh'
            skills:
              - 'ssot/.claude/skills/**'
              - 'guard-skills.sh'
              - 'score-skills.sh'
            commands:
              - 'ssot/.claude/commands/**'
              - 'guard-commands.sh'
              - 'score-commands.sh'
            settings:
              - 'ssot/.claude/settings.json'
            scripts:
              - 'sync.sh'
              - 'ssot/.claude/statusline.sh'
              - 'ssot/.claude/fetch-usage.sh'
              - 'guard-*.sh'
              - 'score-*.sh'

  validate:
    needs: changes
    runs-on: ubuntu-latest
    # On push to main, ${{ needs.changes.outputs.* }} may be unreliable across merges,
    # so `env.FULL_RUN` forces every check. Also forced when the workflow file itself
    # changes (caught here by `hashFiles`—if this file is in the commit, run everything).
    env:
      FULL_RUN: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'full-ci') }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate settings.json is valid JSON
        if: env.FULL_RUN == 'true' || needs.changes.outputs.settings == 'true'
        run: jq . ssot/.claude/settings.json > /dev/null

      # Commands re-validate when agents change because commands reference agents by
      # subagent_type — an agent rename without a command edit would otherwise slip past.
      - name: Run guard-commands.sh
        if: env.FULL_RUN == 'true' || needs.changes.outputs.commands == 'true' || needs.changes.outputs.agents == 'true'
        run: bash guard-commands.sh

      - name: Score commands — per-file floor (Check A)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.commands == 'true' || needs.changes.outputs.agents == 'true'
        run: |
          PER_FILE_MIN=26
          failed=0
          while IFS=' ' read -r name score; do
            if [ "$score" -lt "$PER_FILE_MIN" ]; then
              echo "::error file=ssot/.claude/commands/$name::scored $score, below per-file floor $PER_FILE_MIN"
              failed=1
            else
              echo "$name: $score"
            fi
          done < <(bash score-commands.sh --per-file)
          exit $failed

      - name: Score commands — average-per-command floor (Check B)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.commands == 'true' || needs.changes.outputs.agents == 'true'
        run: |
          AVG_MIN=28
          total=$(bash score-commands.sh)
          count=$(bash score-commands.sh --per-file | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No command files found in ssot/.claude/commands/"
            exit 1
          fi
          avg=$(( total / count ))
          echo "total=$total count=$count avg=$avg floor=$AVG_MIN"
          if [ "$avg" -lt "$AVG_MIN" ]; then
            echo "::error::Average per-command score $avg is below floor $AVG_MIN" >&2
            exit 1
          fi

      - name: Run guard-skills.sh
        if: env.FULL_RUN == 'true' || needs.changes.outputs.skills == 'true'
        run: bash guard-skills.sh

      - name: Score skills — per-file floor (Check A)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.skills == 'true'
        run: |
          PER_FILE_MIN=7
          failed=0
          while IFS=' ' read -r name score; do
            if [ "$score" -lt "$PER_FILE_MIN" ]; then
              echo "::error file=ssot/.claude/skills/$name::scored $score, below per-file floor $PER_FILE_MIN"
              failed=1
            else
              echo "$name: $score"
            fi
          done < <(bash score-skills.sh --per-file)
          exit $failed

      - name: Score skills — average floor (Check B)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.skills == 'true'
        run: |
          AVG_MIN=10
          total=0
          count=0
          while IFS=' ' read -r name score; do
            total=$((total + score))
            count=$((count + 1))
          done < <(bash score-skills.sh --per-file)
          if [ "$count" -eq 0 ]; then
            echo "::error::No skill files found in ssot/.claude/skills/"
            exit 1
          fi
          avg=$(( total / count ))
          echo "total=$total count=$count avg=$avg floor=$AVG_MIN"
          if [ "$avg" -lt "$AVG_MIN" ]; then
            echo "::error::Average per-skill score $avg is below floor $AVG_MIN" >&2
            exit 1
          fi

      - name: Run guard-agents.sh
        if: env.FULL_RUN == 'true' || needs.changes.outputs.agents == 'true'
        run: bash guard-agents.sh

      - name: Score agents — per-file floor (Check A)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.agents == 'true'
        run: |
          PER_FILE_MIN=11
          failed=0
          while IFS=' ' read -r name score; do
            if [ "$score" -lt "$PER_FILE_MIN" ]; then
              echo "::error file=ssot/.claude/agents/$name::scored $score, below per-file floor $PER_FILE_MIN"
              failed=1
            else
              echo "$name: $score"
            fi
          done < <(bash score-agents.sh --per-file)
          exit $failed

      - name: Score agents — average floor (Check B)
        if: env.FULL_RUN == 'true' || needs.changes.outputs.agents == 'true'
        run: |
          AVG_MIN=12
          total=0
          count=0
          while IFS=' ' read -r name score; do
            total=$((total + score))
            count=$((count + 1))
          done < <(bash score-agents.sh --per-file)
          if [ "$count" -eq 0 ]; then
            echo "::error::No agent files found in ssot/.claude/agents/"
            exit 1
          fi
          avg=$(( total / count ))
          echo "total=$total count=$count avg=$avg floor=$AVG_MIN"
          if [ "$avg" -lt "$AVG_MIN" ]; then
            echo "::error::Average per-agent score $avg is below floor $AVG_MIN" >&2
            exit 1
          fi

      - name: Syntax-check shell scripts
        if: env.FULL_RUN == 'true' || needs.changes.outputs.scripts == 'true'
        run: |
          bash -n sync.sh
          bash -n guard-commands.sh
          bash -n score-commands.sh
          bash -n guard-skills.sh
          bash -n score-skills.sh
          bash -n guard-agents.sh
          bash -n score-agents.sh
          bash -n ssot/.claude/statusline.sh
          bash -n ssot/.claude/fetch-usage.sh

      - name: Assert no inert model="opus" annotations
        if: env.FULL_RUN == 'true' || needs.changes.outputs.commands == 'true'
        run: |
          if grep -r 'model="opus"' ssot/.claude/commands/; then
            echo "Found inert model=\"opus\" annotations — remove them." >&2
            exit 1
          fi
