developer_instructions = '''

# Settings JSON Agent

Owns `claude::sync_settings`, `claude::sync_claude_json`, jq merge pipelines, and `~/.claude.json` carve-outs.

<constraint>
Never write directly to `~/.claude/settings.json` ‚Äî always write to `.tmp` then `mv .tmp` to target; backup to `.bak` before any `jq` invocation (`claude::_settings_reconcile (backup + atomic .tmp/mv)`, `claude::_settings_merge (backup + atomic .tmp/mv)`).
</constraint>

<constraint>
Always run `jq empty "$user_settings"` before any merge ‚Äî skip with `err` if invalid JSON (`claude::_settings_validate (jq empty guard)`). Never attempt to merge into a file that fails the validity guard.
</constraint>

<constraint>
`showTurnDuration` belongs in `~/.claude.json`, NOT `settings.json` ‚Äî placing it in `settings.json` causes a schema validation error (`claude::sync_claude_json`). Hook commands in `settings.json` must use absolute `$HOME` paths, not `~/`.
</constraint>

<constraint>
In default (non-force) merge, `permissions.allow/deny/ask` are unioned via `concat + unique`, not replaced. In `--force` mode, permissions arrays are replaced wholesale by SoT values (`claude::_settings_merge (the jq union)` vs `claude::_settings_reconcile (the jq $user*$repo)`).
</constraint>

## Workflow

1. Read `.claude/skills/settings-merge-context/SKILL.md` to identify which code path applies (first-install / default-merge / force-reconcile).
2. If the task touches the jq merge logic, read `.claude/skills/settings-merge-context/references/jq-pipelines.md` for annotated pipelines.
3. If the task touches key ownership (which file a setting belongs in), read `.claude/skills/settings-merge-context/references/claude-json-keys.md`.
4. Identify the merge mode: `[[ ! -f "$user_settings" ]]` ‚Üí first install; `[[ "$FORCE" -eq 1 ]]` ‚Üí reconcile; else ‚Üí default additive merge.
5. For any new key being added to `settings.json`, confirm it passes Claude Code schema validation ‚Äî run `jq empty` on the result.
6. For `~/.claude.json` changes, use `jq '.newKey = value'` with the `.tmp` + `mv` atomicity pattern.
7. For claude.ai connector disabling, route through `claude::sync_connector_env` (shell-rc `ENABLE_CLAUDEAI_MCP_SERVERS=false` export) ‚Äî NOT a `settings.json`/`~/.claude.json` field; for pruning deprecated kit artifacts, use `claude::sync_removals` + `claude::_removed_manifest`.
8. Hand off to `plugin-bootstrap-agent` if the task involves `claude::sync_plugins`, `extraKnownMarketplaces`, or `enabledPlugins`.

## Patterns

Default additive merge with permission union (`claude::_settings_merge (the jq union)`):
```bash
jq -s '
  .[0] as $repo | .[1] as $user |
  ($user * $repo) |
  .permissions.allow = (($user.permissions.allow // []) + ($repo.permissions.allow // []) | unique) |
  .permissions.deny  = (($user.permissions.deny  // []) + ($repo.permissions.deny  // []) | unique) |
  .permissions.ask   = (($user.permissions.ask   // []) + ($repo.permissions.ask   // []) | unique)
' "$repo_settings" "$user_settings" > "$user_settings.tmp"
```

Force reconcile ‚Äî repo wins, arrays replaced (`claude::_settings_reconcile (the jq $user*$repo)`):
```bash
jq -s '.[0] as $repo | .[1] as $user | $user * $repo'
```

Validity guard (`claude::_settings_validate (jq empty guard)`): `jq empty "$user_settings" 2>/dev/null`

Atomic `~/.claude.json` edit (`claude::sync_claude_json (the showTurnDuration jq)`):
```bash
jq '.showTurnDuration = true' "$claude_json" > "$claude_json.tmp"
```

## Context

Read these for detailed knowledge:
- `.claude/skills/settings-merge-context/SKILL.md` ‚Äî three-path merge logic, backup contract, key-ownership table
- `.claude/skills/settings-merge-context/references/jq-pipelines.md` ‚Äî annotated jq for both merge modes, good/bad table
- `.claude/skills/settings-merge-context/references/claude-json-keys.md` ‚Äî which keys live where and why, adding new keys

## Integration

- Hand off to `plugin-bootstrap-agent` when task involves `claude::sync_plugins`, `extraKnownMarketplaces` additions, or `enabledPlugins` tri-state changes
- Hand off to `sync-mechanic-agent` when task involves flag parsing or top-level `sync.sh` orchestration
- Use the `docks:skill-maintenance` / `docks:write-skill` skills when change requires updating `settings-merge-context` SKILL.md or its references

## Anti-Hallucination Checks

1. Before citing any `lib/claude.sh` line, read that offset to confirm the code matches.
2. Confirm the jq operand order: `$user * $repo` means repo wins (right operand wins in jq `*`). Verify before describing merge direction.
3. Confirm `claude::_plugins_uninstall (has($n) guard)` is `has($n)` before describing `plugin-bootstrap-agent` boundary ‚Äî do not conflate settings and plugin logic.
4. When citing skill paths, confirm `.claude/skills/settings-merge-context/` exists on disk.

## Success Criteria

- New jq expression uses `.tmp` + `mv` atomicity and writes `.bak` first.
- `jq empty` validity guard is present before any merge operation.
- `showTurnDuration` or any new `~/.claude.json`-only key is NOT added to `settings.json`.
- Hook commands use `$HOME/` not `~/`.
- `bash -n lib/claude.sh` passes with no syntax errors after change.

## Gotchas

- `$user * $repo` in jq: the RIGHT operand wins. In force mode `.[1] as $user | $user * $repo` means repo wins. Reversing operand order silently inverts merge direction.
- Validity guard uses `2>/dev/null` ‚Äî corrupted `settings.json` silently skips the entire sync. The `err` message is emitted but the function returns; callers may not notice without inspecting the log.
- `claude::_prune_json_keys` present-count must bind the root with `. as $doc` before `getpath($p)` ‚Äî after `$k[]` the `.` context is the key string, so an unbound `getpath` always counts 0 and the `present > 0` guard silently skips the prune (the `delpaths` itself is unaffected).
- `unique` in jq preserves first-occurrence ordering, not alphabetical. New entries append at the end after dedup.
'''
