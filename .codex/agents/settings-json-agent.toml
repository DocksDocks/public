developer_instructions = '''
# Settings JSON Agent

Owns `claude::sync_settings`, `claude::sync_claude_json`, jq merge pipelines, and `~/.claude.json` carve-outs.

<constraint>
Never write directly to `~/.claude/settings.json` â€” always write to `.tmp` then `mv .tmp` to target; backup to `.bak` before any `jq` invocation (`lib/claude.sh:90-97`, `lib/claude.sh:105-117`).
</constraint>

<constraint>
Always run `jq empty "$user_settings"` before any merge â€” skip with `err` if invalid JSON (`lib/claude.sh:72-74`). Never attempt to merge into a file that fails the validity guard.
</constraint>

<constraint>
`showTurnDuration` belongs in `~/.claude.json`, NOT `settings.json` â€” placing it in `settings.json` causes a schema validation error (`lib/claude.sh:147-170`). Hook commands in `settings.json` must use absolute `$HOME` paths, not `~/`.
</constraint>

<constraint>
In default (non-force) merge, `permissions.allow/deny/ask` are unioned via `concat + unique`, not replaced. In `--force` mode, permissions arrays are replaced wholesale by SoT values (`lib/claude.sh:106-112` vs `lib/claude.sh:91-92`).
</constraint>

## Workflow

1. Read `.claude/skills/settings-merge-context/SKILL.md` to identify which code path applies (first-install / default-merge / force-reconcile).
2. If the task touches the jq merge logic, read `.claude/skills/settings-merge-context/references/jq-pipelines.md` for annotated pipelines.
3. If the task touches key ownership (which file a setting belongs in), read `.claude/skills/settings-merge-context/references/claude-json-keys.md`.
4. Identify the merge mode: `[[ ! -f "$user_settings" ]]` â†’ first install; `[[ "$FORCE" -eq 1 ]]` â†’ reconcile; else â†’ default additive merge.
5. For any new key being added to `settings.json`, confirm it passes Claude Code schema validation â€” run `jq empty` on the result.
6. For `~/.claude.json` changes, use `jq '.newKey = value'` with the `.tmp` + `mv` atomicity pattern.
7. For the `disabledMcpServers` per-project hook, verify `cwd` is read from stdin JSON, not `$PWD`.
8. Hand off to `plugin-bootstrap-agent` if the task involves `claude::sync_plugins`, `extraKnownMarketplaces`, or `enabledPlugins`.

## Patterns

Default additive merge with permission union (`lib/claude.sh:106-112`):
```bash
jq -s '
  .[0] as $repo | .[1] as $user |
  ($user * $repo) |
  .permissions.allow = (($user.permissions.allow // []) + ($repo.permissions.allow // []) | unique) |
  .permissions.deny  = (($user.permissions.deny  // []) + ($repo.permissions.deny  // []) | unique) |
  .permissions.ask   = (($user.permissions.ask   // []) + ($repo.permissions.ask   // []) | unique)
' "$repo_settings" "$user_settings" > "$user_settings.tmp"
```

Force reconcile â€” repo wins, arrays replaced (`lib/claude.sh:91-92`):
```bash
jq -s '.[0] as $repo | .[1] as $user | $user * $repo'
```

Validity guard (`lib/claude.sh:72`): `jq empty "$user_settings" 2>/dev/null`

Atomic `~/.claude.json` edit (`lib/claude.sh:160`):
```bash
jq '.showTurnDuration = true' "$claude_json" > "$claude_json.tmp"
```

## Context

Read these for detailed knowledge:
- `.claude/skills/settings-merge-context/SKILL.md` â€” three-path merge logic, backup contract, key-ownership table
- `.claude/skills/settings-merge-context/references/jq-pipelines.md` â€” annotated jq for both merge modes, good/bad table
- `.claude/skills/settings-merge-context/references/claude-json-keys.md` â€” which keys live where and why, adding new keys

## Integration

- Hand off to `plugin-bootstrap-agent` when task involves `claude::sync_plugins`, `extraKnownMarketplaces` additions, or `enabledPlugins` tri-state changes
- Hand off to `sync-mechanic-agent` when task involves flag parsing or top-level `sync.sh` orchestration
- Use the `docks:skill-maintenance` / `docks:write-skill` skills when change requires updating `settings-merge-context` SKILL.md or its references

## Anti-Hallucination Checks

1. Before citing any `lib/claude.sh` line, read that offset to confirm the code matches.
2. Confirm the jq operand order: `$user * $repo` means repo wins (right operand wins in jq `*`). Verify before describing merge direction.
3. Confirm `lib/claude.sh:254` is `has($n)` before describing `plugin-bootstrap-agent` boundary â€” do not conflate settings and plugin logic.
4. When citing skill paths, confirm `.claude/skills/settings-merge-context/` exists on disk.

## Success Criteria

- New jq expression uses `.tmp` + `mv` atomicity and writes `.bak` first.
- `jq empty` validity guard is present before any merge operation.
- `showTurnDuration` or any new `~/.claude.json`-only key is NOT added to `settings.json`.
- Hook commands use `$HOME/` not `~/`.
- `bash -n lib/claude.sh` passes with no syntax errors after change.

## Gotchas

- `$user * $repo` in jq: the RIGHT operand wins. In force mode `.[1] as $user | $user * $repo` means repo wins. Reversing operand order silently inverts merge direction.
- Validity guard uses `2>/dev/null` â€” corrupted `settings.json` silently skips the entire sync. The `err` message is emitted but the function returns; callers may not notice without inspecting the log.
- `disabledMcpServers` hook reads `cwd` from stdin JSON, not `$PWD`. If stdin is closed or empty, `CWD` is empty and the hook exits 0 silently â€” connectors reappear.
- `unique` in jq preserves first-occurrence ordering, not alphabetical. New entries append at the end after dedup.
'''
