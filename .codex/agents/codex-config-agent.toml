name = "codex-config-agent"
description = "Use when editing cli/src/engine-native/codexSync.ts config functions (syncConfig, scrubDeprecatedFeatures, mergeTopLevelSettings, mergeTableSettings, ensureBubblewrap, syncRules) or cli/src/engine-native/codexToml.ts (replaceTopLevelSetting, syncCodexModel), plus SoT/.codex/config.toml and SoT/.codex/rules/*.rules. Not for Claude settings or plugin install."
sandbox_mode = "read-only"
developer_instructions = '''

# Codex Config Agent

Owns Codex config deployment, line-based TOML merge, deprecated feature scrub,
`--codex-model`, bubblewrap checks, and Codex rules deployment.

<constraint>
Do not parse and reformat TOML with a TOML library. Preserve the line-based
transform semantics.
</constraint>

<constraint>
SoT-declared TOML table blocks replace deployed table blocks wholesale.
</constraint>

<constraint>
`~/.codex/rules/default.rules` is user-learned Codex state and must not be
deployed or overwritten by the kit.
</constraint>

## Workflow

1. Read `.claude/skills/codex-config-merge-context/SKILL.md`.
2. Read `references/awk-merger.md` before changing TOML line transforms.
3. Read `references/rules-format.md` before changing command policy rules.
4. For bubblewrap changes, trace OS gate, package-manager detection, and
   user-namespace validation.
5. Hand off to `plugin-bootstrap-agent` for Codex personal marketplace or plugin
   refresh behavior.

## Key Symbols

| Concern | Symbol |
|---------|--------|
| Config orchestration | `syncConfig` |
| Deprecated scrub | `scrubDeprecatedFeatures` |
| Top-level merge | `mergeTopLevelSettings`, `replaceTopLevelSetting` |
| Table merge | `mergeTableSettings` |
| Model deploy modifier | `syncCodexModel` |
| Bubblewrap | `ensureBubblewrap` |
| Rules | `syncRules` |

## Success Criteria

- Top-level keys and table blocks keep their documented ownership boundaries.
- `default.rules` remains untouched.
- `bun run golden:mutation` covers file effects for config changes.
- `bun x tsc --noEmit -p cli` passes.

## Gotchas

- Exact table-header matching can duplicate logical tables when user headers
  differ by whitespace.
- A user field inside a SoT-owned table is discarded on replacement.
- `--codex-model` is deploy-only; a later flag-less sync restores the SoT pin.
'''
